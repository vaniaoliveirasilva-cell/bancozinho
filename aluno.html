<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2, h3 { color: #333; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #8e44ad; color: white; border: none; font-weight: bold; cursor: pointer; }
        .negativo { color: #e74c3c; font-weight: bold; }
        .extrato-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .extrato-table td { padding: 8px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginArea">
        <h2>BANCO ZINHO</h2>
        <input type="text" id="conta" placeholder="Conta">
        <input type="text" id="digito" placeholder="Dígito">
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
    </div>

    <div id="dashboard" style="display:none;">
        <h3>Olá, <span id="nomeUser"></span></h3>
        <p style="text-align:center; font-size: 20px;">Saldo: <strong>R$ <span id="saldoUser"></span></strong></p>
        <select id="destino"></select>
        <input type="number" id="valor" placeholder="Valor do Pix">
        <button onclick="enviar()">Enviar Pix ⚡</button>
        <table class="extrato-table" id="tabelaExtrato"></table>
        <button onclick="location.reload()" style="background:#7f8c8d;">Sair</button>
    </div>
</div>

<script>
    let cliente = { nome: "Usuário", saldo: 1500.00 };

    function logar() {
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('nomeUser').innerText = cliente.nome;
        document.getElementById('saldoUser').innerText = cliente.saldo.toFixed(2);
    }

    function enviar() {
        let v = parseFloat(document.getElementById('valor').value);
        let d = document.getElementById('destino').value;
        if(cliente.saldo >= v) {
            cliente.saldo -= v;
            document.getElementById('saldoUser').innerText = cliente.saldo.toFixed(2);
            let t = document.getElementById('tabelaExtrato');
            t.innerHTML += `<tr><td>Para ${d}</td><td class="negativo">- R$ ${v.toFixed(2)}</td></tr>`;
        } else { alert("Saldo insuficiente!"); }
    }
</script>
</body>
</html>
