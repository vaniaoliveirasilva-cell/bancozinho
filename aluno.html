<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - BANCO ZINHO</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #eef2f7; color: #333; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .secao { margin-top: 20px; padding-top: 20px; border-top: 1px solid #edf2f7; }
        .input-group { display: flex; align-items: center; margin: 10px 0; }
        .input-group span { background: #edf2f7; padding: 12px; border: 1px solid #cbd5e1; border-right: none; border-radius: 6px 0 0 6px; font-weight: bold; }
        .input-group input { border-radius: 0 6px 6px 0; margin: 0; }
        .conta-group { display: flex; gap: 8px; margin: 8px 0; }
        .conta-group input#loginConta { flex: 3; }
        .conta-group input#loginDigito { flex: 1; text-align: center; background: #f1f5f9; color: #94a3b8; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        button { background-color: #8e44ad; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #732d91; }
        .saldo-box { background: linear-gradient(135deg, #2c3e50, #1a252f); color: white; padding: 20px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .saldo-val { font-size: 32px; font-weight: bold; margin-top: 5px; color: #2ecc71; }
        .oculto { display: none; }
        .status-aluno { text-align: center; font-weight: bold; font-size: 13px; color: #27ae60; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="statusConexaoAluno" class="status-aluno">🟢 Conectado à Rede de Transações</div>

    <h2>🏦 BANCO ZINHO</h2>
    
    <div id="telaLogin">
        <div class="conta-group">
            <input type="text" id="loginConta" placeholder="Número da Conta (Ex: 1)">
            <input type="text" id="loginDigito" placeholder="Dg" value="0" disabled>
        </div>
        <input type="password" id="loginSenha" placeholder="Digite sua senha cadastrada">
        <button onclick="fazerLoginAluno()" style="background-color: #27ae60;">Acessar Conta 🔐</button>
    </div>

    <div id="telaDashboard" class="oculto">
        <p>Olá, <strong id="nomeClienteLogado">...</strong>! (<span id="tipoClienteLogado">...</span>)</p>
        <div class="saldo-box">
            <div>Seu Saldo Disponível</div>
            <div class="saldo-val" id="saldoClienteLogado">R$ 0,00</div>
        </div>

        <div class="secao">
            <h3>Enviar Pix ⚡</h3>
            <select id="pixDestino"><option value="">Selecione quem vai receber...</option></select>
            <div class="input-group">
                <span>R$</span>
                <input type="number" id="pixValor" placeholder="0,00" step="0.01">
            </div>
            <button onclick="enviarPixAluno()">Enviar Pix Agora ⚡</button>
        </div>
        <button onclick="location.reload()" style="background-color: #e74c3c; margin-top: 15px;">Sair com Segurança 🚪</button>
    </div>
</div>

<script>
let bancoDados = [];
const idPlanilha = "1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4"; 
let clienteLogado = null;

async function puxarDadosAluno() {
    const urlJSON = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json&gid=0`;
    
    try {
        const response = await fetch(urlJSON);
        const texto = await response.text();
        const jsonPuro = JSON.parse(texto.substr(47).slice(0, -2));
        const linhas = jsonPuro.table.rows;
        
        bancoDados = [];
        linhas.forEach((linha) => {
            if (linha.c && linha.c[0] && linha.c[2]) {
                let contaBruta = linha.c[0].v !== null ? linha.c[0].v.toString().trim() : "";
                if (contaBruta.toLowerCase() === "conta") return;

                let saldoNumero = 0;
                if (linha.c[5] && linha.c[5].v !== null) {
                    saldoNumero = typeof Math.abs(linha.c[5].v) === 'number' ? linha.c[5].v : parseFloat(linha.c[5].v.toString().replace(',', '.'));
                }

                bancoDados.push({
                    conta: contaBruta.padStart(4, '0'),
                    digito: (linha.c[1] && linha.c[1].v !== null) ? linha.c[1].v.toString().trim() : "0",
                    nome: (linha.c[2] && linha.c[2].v !== null) ? linha.c[2].v.toString().trim().toUpperCase() : "",
                    tipo: (linha.c[3] && linha.c[3].v !== null) ? linha.c[3].v.toString().trim().toUpperCase() : "CLIENTE",
                    senha: (linha.c[4] && linha.c[4].v !== null) ? linha.c[4].v.toString().trim() : "1234",
                    saldo: isNaN(saldoNumero) ? 0 : saldoNumero
                });
            }
        });
        if(clienteLogado) reatualizarContaLogada();
    } catch (e) { console.error("Erro na leitura do Aluno:", e); }
}

async function fazerLoginAluno() {
    const contaDig = document.getElementById('loginConta').value.trim();
    const senhaDig = document.getElementById('loginSenha').value.trim();

    await puxarDadosAluno();

    const conta = bancoDados.find(p => parseInt(p.conta, 10) === parseInt(contaDig, 10));

    if (!conta) { alert("Conta não encontrada!"); return; }
    if (senhaDig !== conta.senha) { alert("Senha incorreta!"); return; }

    clienteLogado = conta;
    document.getElementById('telaLogin').classList.add('oculto');
    document.getElementById('telaDashboard').classList.remove('oculto');
    atualizarTelaPainel();
}

function reatualizarContaLogada() {
    const atualizada = bancoDados.find(p => p.conta === clienteLogado.conta);
    if(atualizada) {
        clienteLogado = atualizada;
        document.getElementById('saldoClienteLogado').textContent = clienteLogado.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
}

function atualizarTelaPainel() {
    document.getElementById('nomeClienteLogado').textContent = clienteLogado.nome;
    document.getElementById('tipoClienteLogado').textContent = clienteLogado.tipo;
    document.getElementById('saldoClienteLogado').textContent = clienteLogado.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    const select = document.getElementById('pixDestino');
    select.innerHTML = '<option value="">Selecione quem vai receber...</option>';
    
    bancoDados.sort((a, b) => a.nome.localeCompare(b.nome));
    bancoDados.forEach(p => {
        if(p.conta !== clienteLogado.conta) {
            let opt = document.createElement('option');
            opt.value = p.nome;
            opt.textContent = `${p.nome} (${p.tipo})`;
            select.appendChild(opt);
        }
    });
}

function enviarPixAluno() {
    const dest = document.getElementById('pixDestino').value;
    const val = parseFloat(document.getElementById('pixValor').value);

    if (!dest || isNaN(val) || val <= 0) { alert("Preencha o valor corretamente."); return; }
    if (clienteLogado.saldo < val) { alert("Saldo insuficiente!"); return; }

    const contaDestino = bancoDados.find(p => p.nome === dest);
    clienteLogado.saldo -= val;
    contaDestino.saldo += val;

    document.getElementById('pixValor').value = '';
    atualizarTelaPainel();
    alert(`⚡ Pix de R$ ${val.toFixed(2).replace('.',',')} enviado com sucesso para ${dest}!`);
}
</script>
</body>
</html>
