<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Extrato</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .extrato-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .extrato-table th, .extrato-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .saida { color: #e74c3c; font-weight: bold; } /* Vermelho para saída */
        .entrada { color: #27ae60; font-weight: bold; } /* Verde para entrada */
        .oculto { display: none; }
    </style>
</head>
<body>

<div class="container" id="dashboard">
    <h2>Olá, <span id="nomeUser"></span></h2>
    <h3>Saldo: R$ <span id="saldoUser"></span></h3>

    <h4>📜 Extrato de Movimentações</h4>
    <table class="extrato-table">
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Tipo</th>
                <th>Valor</th>
            </tr>
        </thead>
        <tbody id="listaExtrato">
            </tbody>
    </table>
</div>

<script>
    // A lógica deve integrar com o seu bancoDados que já puxa da planilha
    let historico = []; // Array para guardar as transações

    function registrarTransacao(nome, tipo, valor) {
        historico.push({ nome, tipo, valor });
        atualizarExtrato();
    }

    function atualizarExtrato() {
        const corpo = document.getElementById('listaExtrato');
        corpo.innerHTML = ''; // Limpa antes de redesenhar
        
        historico.forEach(item => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${item.tipo === 'SAÍDA' ? 'Pix enviado para: ' : 'Pix recebido de: '} ${item.nome}</td>
                <td class="${item.tipo === 'SAÍDA' ? 'saida' : 'entrada'}">${item.tipo}</td>
                <td class="${item.tipo === 'SAÍDA' ? 'saida' : 'entrada'}">R$ ${item.valor.toFixed(2)}</td>
            `;
            corpo.appendChild(row);
        });
    }

    // Exemplo de como chamar após um Pix (adicione isso na sua função de envio):
    // registrarTransacao('NOME DO ALUNO', 'SAÍDA', 50.00);
</script>
</body>
</html>
