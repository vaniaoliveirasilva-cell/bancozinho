<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Acesso</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #6c5ce7; color: white; border: none; font-weight: bold; cursor: pointer; }
        .oculto { display: none; }
        .saldo { text-align: center; font-size: 24px; font-weight: bold; color: #2d3436; margin: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="telaLogin">
        <h2>Login - BANCO ZINHO</h2>
        <input type="text" id="loginConta" placeholder="Número da Conta">
        <input type="text" id="loginDigito" placeholder="Dígito">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button onclick="fazerLogin()">Acessar Conta</button>
    </div>

    <div id="telaDashboard" class="oculto">
        <h3>Olá, <span id="nomeCliente"></span></h3>
        <div class="saldo" id="saldoCliente">R$ 0,00</div>
        <select id="pixDestino"></select>
        <input type="number" id="pixValor" placeholder="Valor (R$)">
        <button onclick="enviarPix()" style="background: #00b894;">Enviar Pix</button>
        <button onclick="location.reload()" style="background: #d63031;">Sair</button>
    </div>
</div>

<script>
let bancoDados = [];
let clienteLogado = null;
const idPlanilha = "1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4";
const urlScript = "https://script.google.com/macros/s/AKfycbxehEqPyZ2MkvHPIALHiC3oddM-YO1j34ctNYBXTstUS2H9dfLi25QyeASP--nDNwJgkA/exec";

async function carregarDados() {
    const url = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json&gid=0`;
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substr(47).slice(0, -2));
    
    bancoDados = json.table.rows.map(row => ({
        conta: String(row.c[0]?.v || "").trim(),
        digito: String(row.c[1]?.v || "").trim(),
        nome: String(row.c[2]?.v || "").trim(),
        senha: String(row.c[4]?.v || "").trim(),
        saldo: parseFloat(row.c[5]?.v || 0)
    }));
}

async function fazerLogin() {
    await carregarDados();
    const c = document.getElementById('loginConta').value.trim();
    const d = document.getElementById('loginDigito').value.trim();
    const s = document.getElementById('loginSenha').value.trim();

    clienteLogado = bancoDados.find(p => p.conta === c && p.digito === d && p.senha === s);

    if (clienteLogado) {
        document.getElementById('telaLogin').classList.add('oculto');
        document.getElementById('telaDashboard').classList.remove('oculto');
        document.getElementById('nomeCliente').textContent = clienteLogado.nome;
        document.getElementById('saldoCliente').textContent = clienteLogado.saldo.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        
        const sel = document.getElementById('pixDestino');
        bancoDados.forEach(p => {
            if(p.nome !== clienteLogado.nome) sel.innerHTML += `<option value="${p.nome}">${p.nome}</option>`;
        });
    } else {
        alert("Dados incorretos! Verifique a Conta, Dígito ou Senha.");
    }
}

async function enviarPix() {
    const dest = document.getElementById('pixDestino').value;
    const val = parseFloat(document.getElementById('pixValor').value);

    if (!val || val <= 0) return alert("Valor inválido");
    if (clienteLogado.saldo < val) return alert("Saldo insuficiente");

    try {
        await fetch(urlScript, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({ origem: clienteLogado.nome, destino: dest, valor: val })
        });
        alert("Pix enviado com sucesso!");
        location.reload();
    } catch(e) { alert("Erro de conexão com o Banco."); }
}
</script>
</body>
</html>
