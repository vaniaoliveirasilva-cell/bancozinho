<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Cliente - Conexão Dinâmica</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #eef2f7; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { max-width: 450px; margin: 20px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .secao { margin-top: 20px; padding-top: 20px; border-top: 1px solid #edf2f7; }
        .input-group { display: flex; align-items: center; margin: 10px 0; }
        .input-group span { background: #edf2f7; padding: 12px; border: 1px solid #cbd5e1; border-right: none; border-radius: 6px 0 0 6px; font-weight: bold; }
        .input-group input { border-radius: 0 6px 6px 0; margin: 0; }
        .conta-group { display: flex; gap: 8px; margin: 8px 0; }
        .conta-group input#loginConta { flex: 3; }
        .conta-group input#loginDigito { flex: 1; text-align: center; }
        input, select, button { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 15px; }
        button { background-color: #8e44ad; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #732d91; }
        .saldo-box { background: linear-gradient(135deg, #2c3e50, #1a252f); color: white; padding: 20px; border-radius: 10px; margin: 15px 0; text-align: center; }
        .saldo-val { font-size: 32px; font-weight: bold; margin-top: 5px; color: #2ecc71; }
        .oculto { display: none; }
        .config-aluno { background: #fff3cd; padding: 10px; border-radius: 6px; border: 1px solid #ffeeba; font-size: 12px; margin-bottom: 15px; }
        .status-aluno { text-align: center; font-weight: bold; font-size: 13px; color: #e67e22; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="config-aluno">
        <label>🔗 Vincular Link da Planilha do Evento:</label>
        <input type="text" id="urlPlanilhaAluno" placeholder="Cole o link da planilha aqui" oninput="processarLinkAluno()">
        <div id="statusConexaoAluno" class="status-aluno">Aguardando link da planilha...</div>
    </div>

    <h1 id="nomeBancoExibicao">🏦 BANCO ZINHO</h1>
    
    <div id="telaLogin">
        <p class="welcome-text" style="text-align:center; color:#666;">Digite seus dados para acessar a conta.</p>
        <div class="conta-group">
            <input type="text" id="loginConta" placeholder="Conta (Ex: 0001)">
            <input type="text" id="loginDigito" placeholder="Dg" value="0" disabled style="background: #f1f5f9; color: #94a3b8;">
        </div>
        <input type="password" id="loginSenha" placeholder="Sua senha eletrônica (Padrão: 1234)">
        <button onclick="fazerLoginAluno()" style="background-color: #27ae60;">Acessar Conta Segura 🔐</button>
    </div>

    <div id="telaDashboard" class="oculto">
        <p>Olá, <strong id="nomeClienteLogado">Cliente</strong>!</p>
        <div class="saldo-box">
            <div>Seu Saldo Disponível</div>
            <div class="saldo-val" id="saldoClienteLogado">R$ 0,00</div>
        </div>

        <div class="secao">
            <h2>Enviar um Pix ⚡</h2>
            <select id="pixDestino"><option value="">Selecione quem vai receber...</option></select>
            <div class="input-group">
                <span>R$</span>
                <input type="number" id="pixValor" placeholder="0,00" step="0.01">
            </div>
            <button onclick="enviarPixAluno()">Confirmar Pix ⚡</button>
        </div>
        <button onclick="location.reload()" style="background-color: #e74c3c;">Sair com Segurança 🚪</button>
    </div>
</div>

<script>
let bancoDados = [];
let idPlanilha = "";
let clienteLogado = null;

// Carrega automaticamente a planilha salva ao abrir a página do aluno
window.onload = function() {
    const linkSalvo = localStorage.getItem('linkPlanilhaUniversal');
    if(linkSalvo) {
        document.getElementById('urlPlanilhaAluno').value = linkSalvo;
        processarLinkAluno(true);
    }
}

function processarLinkAluno(autoCarregar = false) {
    const url = document.getElementById('urlPlanilhaAluno').value.trim();
    if(!url) return;

    const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if (match && match[1]) {
        idPlanilha = match[1];
        localStorage.setItem('linkPlanilhaUniversal', url);
        document.getElementById('statusConexaoAluno').innerHTML = "<span style='color: #27ae60;'>🟢 Banco Conectado!</span>";
        if(autoCarregar) {
            puxarDadosAluno();
        }
    } else {
        document.getElementById('statusConexaoAluno').innerHTML = "<span style='color: #c0392b;'>❌ Link inválido.</span>";
    }
}

async function puxarDadosAluno() {
    if(!idPlanilha) return;
    const urlLeitura = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json`;
    
    try {
        const response = await fetch(urlLeitura);
        const texto = await response.text();
        const jsonPuro = JSON.parse(texto.substr(47).slice(0, -2));
        const linhas = jsonPuro.table.rows;
        
        bancoDados = [];
        linhas.forEach((linha, index) => {
            if(index === 0 && linha.c[0] && isNaN(linha.c[0].v)) return;
            
            if(linha.c && linha.c[0] !== null && linha.c[1] !== null) {
                let saldoBruto = 0;
                if (linha.c[2]) {
                    if (typeof linha.c[2].v === 'number') {
                        saldoBruto = linha.c[2].v;
                    } else {
                        saldoBruto = parseFloat(linha.c[2].v.toString().replace(',', '.'));
                    }
                }

                bancoDados.push({
                    conta: linha.c[0] ? linha.c[0].v.toString().padStart(4, '0') : index.toString().padStart(4, '0'),
                    nome: linha.c[1] ? linha.c[1].v.toString().toUpperCase() : "SEM NOME",
                    saldo: isNaN(saldoBruto) ? 0 : saldoBruto,
                    senha: "1234" // Senha padrão de acesso
                });
            }
        });
        if(clienteLogado) reatualizarContaLogada();
    } catch (e) { 
        console.log("Erro de sincronização"); 
    }
}

async function fazerLoginAluno() {
    const contaDig = document.getElementById('loginConta').value.trim();
    const senhaDig = document.getElementById('loginSenha').value.trim();

    // Garante que está lendo os saldos mais novos da planilha antes de logar
    await puxarDadosAluno();

    if(bancoDados.length === 0) {
        alert("Planilha vazia ou não conectada. Verifique o link no topo.");
        return;
    }

    const conta = bancoDados.find(p => parseInt(p.conta, 10) === parseInt(contaDig, 10));

    if (!conta) {
        alert("Conta não encontrada!");
        return;
    }

    if (senhaDig !== conta.senha) {
        alert("Senha incorreta! Use a senha padrão: 1234");
        return;
    }

    clienteLogado = conta;
    document.getElementById('telaLogin').classList.add('oculto');
    document.getElementById('telaDashboard').classList.remove('oculto');
    atualizarTelaPainel();
}

function reatualizarContaLogada() {
    const atualizada = bancoDados.find(p => p.conta === clienteLogado.conta);
    if(atualizada) {
        clienteLogado = atualizada;
        document.getElementById('saldoClienteLogado').textContent = clienteLogado.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
}

function atualizarTelaPainel() {
    document.getElementById('nomeClienteLogado').textContent = clienteLogado.nome;
    document.getElementById('saldoClienteLogado').textContent = clienteLogado.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

    const select = document.getElementById('pixDestino');
    select.innerHTML = '<option value="">Selecione quem vai receber...</option>';
    
    // Organiza em ordem alfabética para os alunos acharem fácil
    bancoDados.sort((a, b) => a.nome.localeCompare(b.nome));
    
    bancoDados.forEach(p => {
        if(p.conta !== clienteLogado.conta) {
            let opt = document.createElement('option'); 
            opt.value = p.nome; 
            opt.textContent = p.nome;
            select.appendChild(opt);
        }
    });
}

function enviarPixAluno() {
    const dest = document.getElementById('pixDestino').value;
    const val = parseFloat(document.getElementById('pixValor').value);

    if (!dest || isNaN(val) || val <= 0) {
        alert("Preencha o valor do Pix corretamente.");
        return;
    }

    if (clienteLogado.saldo < val) {
        alert("Saldo insuficiente para enviar este Pix!");
        return;
    }

    const contaDestino = bancoDados.find(p => p.nome === dest);
    
    // Executa a transferência matemática na tela
    clienteLogado.saldo -= val;
    contaDestino.saldo += val;

    document.getElementById('pixValor').value = '';
    atualizarTelaPainel();
    
    alert(`⚡ Pix de R$ ${val.toFixed(2).replace('.',',')} enviado com sucesso para ${dest}!\n\n(Aviso: O administrador validará o saldo final).`);
}
</script>
</body>
</html>
