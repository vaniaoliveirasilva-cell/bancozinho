<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Painel do Aluno</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .extrato-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .extrato-table th, .extrato-table td { padding: 8px; border: 1px solid #eee; text-align: left; }
        .saida { color: #e74c3c; font-weight: bold; }
        .entrada { color: #27ae60; font-weight: bold; }
        .oculto { display: none; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #8e44ad; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="telaLogin">
        <h2>BANCO ZINHO</h2>
        <input type="text" id="loginConta" placeholder="Número da Conta">
        <input type="text" id="loginDigito" placeholder="Dígito">
        <input type="password" id="loginSenha" placeholder="Senha">
        <button onclick="fazerLogin()">Acessar</button>
    </div>

    <div id="telaDashboard" class="oculto">
        <h3>Olá, <span id="nomeUser"></span></h3>
        <p>Saldo: <strong>R$ <span id="saldoUser"></span></strong></p>
        
        <select id="pixDestino"></select>
        <input type="number" id="pixValor" placeholder="Valor">
        <button onclick="realizarPix()">Enviar Pix</button>

        <h4>Extrato de Movimentações</h4>
        <table class="extrato-table">
            <thead><tr><th>Descrição</th><th>Tipo</th><th>Valor</th></tr></thead>
            <tbody id="listaExtrato"></tbody>
        </table>
        <br>
        <button onclick="location.reload()" style="background:#7f8c8d;">Sair</button>
    </div>
</div>

<script>
    let bancoDados = [], clienteLogado = null;
    const idPlanilha = "1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4";

    // 1. Carrega os dados da planilha
    async function carregarDados() {
        const res = await fetch(`https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json`);
        const texto = await res.text();
        const json = JSON.parse(texto.substr(47).slice(0, -2));
        bancoDados = json.table.rows.map(row => ({
            conta: row.c[0].v.toString().split('-')[0].trim(),
            digito: row.c[1].v.toString().trim(),
            nome: row.c[2].v,
            senha: row.c[4].v.toString(),
            saldo: parseFloat(row.c[5].v)
        }));
    }

    // 2. Login
    async function fazerLogin() {
        await carregarDados();
        const c = document.getElementById('loginConta').value.trim();
        const d = document.getElementById('loginDigito').value.trim();
        const s = document.getElementById('loginSenha').value.trim();
        clienteLogado = bancoDados.find(p => p.conta === c && p.digito === d && p.senha === s);
        
        if (clienteLogado) {
            document.getElementById('telaLogin').classList.add('oculto');
            document.getElementById('telaDashboard').classList.remove('oculto');
            document.getElementById('nomeUser').innerText = clienteLogado.nome;
            document.getElementById('saldoUser').innerText = clienteLogado.saldo.toFixed(2);
            preencherDestinatarios();
        } else { alert("Dados incorretos!"); }
    }

    function preencherDestinatarios() {
        const sel = document.getElementById('pixDestino');
        bancoDados.forEach(p => {
            if (p.nome !== clienteLogado.nome) {
                let opt = document.createElement('option');
                opt.value = p.nome;
                opt.innerText = p.nome;
                sel.appendChild(opt);
            }
        });
    }

    // 3. Função do Extrato (Nova)
    function atualizarExtrato(desc, tipo, valor) {
        const corpo = document.getElementById('listaExtrato');
        corpo.innerHTML += `<tr><td>${desc}</td><td class="${tipo.toLowerCase()}">${tipo}</td><td>R$ ${valor.toFixed(2)}</td></tr>`;
    }

    // 4. Executa Pix e atualiza Extrato
    function realizarPix() {
        const dest = document.getElementById('pixDestino').value;
        const valor = parseFloat(document.getElementById('pixValor').value);
        
        if (clienteLogado.saldo >= valor) {
            clienteLogado.saldo -= valor;
            document.getElementById('saldoUser').innerText = clienteLogado.saldo.toFixed(2);
            atualizarExtrato('Envio para ' + dest, 'SAÍDA', valor);
            alert("Pix enviado com sucesso!");
        } else {
            alert("Saldo insuficiente!");
        }
    }
</script>
</body>
</html>
