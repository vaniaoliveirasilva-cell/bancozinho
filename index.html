<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Painel Admin Universal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .secao { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .input-group { display: flex; align-items: center; margin: 5px 0; }
        .input-group span { background: #eee; padding: 10px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; font-weight: bold; }
        .input-group input { border-radius: 0 4px 4px 0; margin: 0; }
        input, select, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219653; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2980b9; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .config-url { background: #e8f4fd; padding: 15px; border-radius: 6px; border: 1px solid #bce0fd; margin-bottom: 20px; }
        .status-msg { font-weight: bold; margin-top: 5px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 BANCO ZINHO - Administrador</h1>
    
    <div class="config-url">
        <label style="font-weight: bold; color: #2980b9;">🔗 Cole o Link de Partilha da sua Planilha Google:</label>
        <input type="text" id="urlPlanilhaGoogle" placeholder="Cole o link aqui..." oninput="conectar()">
        <div id="statusConexao" class="status-msg" style="color: #7f8c8d;">A aguardar link...</div>
    </div>

    <div class="secao">
        <h2>1. Cadastrar Cliente Manualmente</h2>
        <input type="text" id="nomeParticipante" placeholder="Nome do Cliente (Aluno ou Loja)">
        <div class="input-group">
            <span>R$</span>
            <input type="number" id="saldoInicial" placeholder="Saldo inicial" step="0.01">
        </div>
        <select id="tipoParticipante">
            <option value="Cliente">Cliente</option>
            <option value="Loja Fictícia">Loja Fictícia</option>
        </select>
        <button onclick="cadastrarManual()">Cadastrar no Painel</button>
    </div>

    <div class="secao">
        <h2>2. Base de Dados Online (Saldos)</h2>
        <button onclick="puxarDadosDaNuvem()" style="background-color: #3498db; margin-bottom: 10px;">🔄 Forçar Atualização / Ler Planilha</button>
        <table>
            <thead>
                <tr>
                    <th>Conta</th>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Senha</th>
                    <th>Saldo Atual</th>
                </tr>
            </thead>
            <tbody id="tabelaSaldos"></tbody>
        </table>
    </div>
</div>

<script>
let bancoDados = [];
let idPlanilha = "1sBU9OoOwdLme1bYyVNsfyhLi10tZ1wDQ33GVkwA9BKs"; // Já deixei o ID da sua planilha direto aqui!

window.onload = function() {
    document.getElementById('urlPlanilhaGoogle').value = "https://docs.google.com/spreadsheets/d/" + idPlanilha + "/edit";
    conectar();
}

function conectar() {
    const url = document.getElementById('urlPlanilhaGoogle').value.trim();
    const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    if (match && match[1]) {
        idPlanilha = match[1];
        document.getElementById('statusConexao').innerHTML = "🟢 Conectado à planilha! Clique no botão azul abaixo para carregar.";
        puxarDadosDaNuvem();
    } else {
        document.getElementById('statusConexao').innerHTML = "❌ Link inválido.";
    }
}

async function puxarDadosDaNuvem() {
    if(!idPlanilha) return;
    document.getElementById('statusConexao').innerHTML = "🔄 A ler dados da planilha...";
    
    // Formato de leitura alternativo e infalível para o Google Sheets público
    const urlLeitura = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json&sheet=珍`;
    
    try {
        const response = await fetch(`https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json`);
        const texto = await response.text();
        const jsonValido = JSON.parse(texto.substr(47).slice(0, -2));
        
        const linhas = jsonValido.table.rows;
        bancoDados = [];
        
        linhas.forEach((linha, index) => {
            if(index === 0) return; // Pula a linha de títulos
            if(linha.c && linha.c[0] && linha.c[1]) {
                bancoDados.push({
                    conta: linha.c[0] ? linha.c[0].v.toString().padStart(4, '0') : (index).toString().padStart(4, '0'),
                    nome: linha.c[1] ? linha.c[1].v : "Sem nome",
                    saldo: linha.c[2] ? parseFloat(linha.c[2].v) : 0,
                    digito: "0",
                    tipo: "Cliente",
                    senha: "1234"
                });
            }
        });
        
        atualizarInterface();
        document.getElementById('statusConexao').innerHTML = "🟢 Dados carregados com sucesso!";
    } catch (erro) {
        console.error(erro);
        document.getElementById('statusConexao').innerHTML = "❌ Erro ao ler. Certifique-se de que a planilha está em 'Qualquer pessoa com o link' como Editor.";
    }
}

function cadastrarManual() {
    const nome = document.getElementById('nomeParticipante').value.trim().toUpperCase();
    const saldo = parseFloat(document.getElementById('saldoInicial').value) || 0;
    if (!nome) { alert("Digite o nome."); return; }
    
    const numeroConta = (bancoDados.length + 1).toString().padStart(4, '0');
    bancoDados.push({ nome, conta: numeroConta, digito: "0", senha: "1234", saldo: saldo, tipo: "Cliente" });
    
    atualizarInterface();
    document.getElementById('nomeParticipante').value = '';
    document.getElementById('saldoInicial').value = '';
    alert("Adicionado ao painel! (Para salvar de volta na planilha do Google, digite diretamente no Sheets e clique em Atualizar aqui).");
}

function atualizarInterface() {
    const tabela = document.getElementById('tabelaSaldos');
    tabela.innerHTML = '';
    bancoDados.forEach(p => {
        tabela.innerHTML += `<tr>
            <td><code>${p.conta}</code></td>
            <td>${p.nome}</td>
            <td>${p.tipo}</td>
            <td><code>${p.senha}</code></td>
            <td>${p.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
