<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Painel Admin Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .secao { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .config-url { background: #e8f4fd; padding: 15px; border-radius: 6px; border: 1px solid #bce0fd; margin-bottom: 20px; }
        .status-msg { font-weight: bold; margin-top: 5px; font-size: 14px; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 BANCO ZINHO - Administrador</h1>
    
    <div class="config-url">
        <label style="font-weight: bold; color: #2980b9;">🔗 Link da Planilha do Ecossistema:</label>
        <input type="text" id="urlPlanilhaGoogle" value="https://docs.google.com/spreadsheets/d/1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4/edit?gid=0#gid=0" readonly style="background:#f1f5f9; color:#64748b;">
        <div id="statusConexao" class="status-msg">🟢 Conexão direta por JSON ativada!</div>
    </div>

    <div class="secao">
        <h2>1. Sincronização Direta</h2>
        <button onclick="puxarDadosDaNuvem()" style="background-color: #27ae60; font-size: 16px;">🔄 Ler / Atualizar Dados da Planilha</button>
    </div>

    <div class="secao">
        <h2>2. Lista de Contas Ativas</h2>
        <table>
            <thead>
                <tr>
                    <th>Conta-Dg</th>
                    <th>Nome do Usuário</th>
                    <th>Tipo</th>
                    <th>Senha Acesso</th>
                    <th>Saldo Atual</th>
                </tr>
            </thead>
            <tbody id="tabelaSaldos">
                <tr><td colspan="5" style="text-align:center; color:#999;">Clique no botão verde acima para carregar as informações.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
let bancoDados = [];
const idPlanilha = "1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4"; 

async function puxarDadosDaNuvem() {
    document.getElementById('statusConexao').innerHTML = "🔄 Buscando dados em tempo real...";
    
    // API do Google que puxa os dados formatados em JSON independente de publicação externa
    const urlJSON = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json&gid=0`;
    
    try {
        const response = await fetch(urlJSON);
        const texto = await response.text();
        
        // Remove a proteção padrão que o Google coloca no JSON
        const jsonPuro = JSON.parse(texto.substr(47).slice(0, -2));
        const linhas = jsonPuro.table.rows;
        
        bancoDados = [];
        
        linhas.forEach((linha) => {
            // Verifica se as colunas essenciais existem na linha
            if (linha.c && linha.c[0] && linha.c[2]) {
                
                // Pega os valores brutos limpando textos e tratando nulos
                let contaBruta = linha.c[0].v !== null ? linha.c[0].v.toString().trim() : "";
                
                // Ignora a linha do cabeçalho caso ela apareça
                if (contaBruta.toLowerCase() === "conta") return;

                let contaLimpa = contaBruta.padStart(4, '0');
                let digitoLimpo = (linha.c[1] && linha.c[1].v !== null) ? linha.c[1].v.toString().trim() : "0";
                let nomeLimpo = (linha.c[2] && linha.c[2].v !== null) ? linha.c[2].v.toString().trim().toUpperCase() : "";
                let tipoLimpo = (linha.c[3] && linha.c[3].v !== null) ? linha.c[3].v.toString().trim().toUpperCase() : "CLIENTE";
                let senhaLimpa = (linha.c[4] && linha.c[4].v !== null) ? linha.c[4].v.toString().trim() : "1234";
                
                // O Saldo Atual está na 6ª coluna (Índice 5)
                let saldoNumero = 0;
                if (linha.c[5] && linha.c[5].v !== null) {
                    saldoNumero = typeof linha.c[5].v === 'number' ? linha.c[5].v : parseFloat(linha.c[5].v.toString().replace(',', '.'));
                }

                bancoDados.push({
                    conta: contaLimpa,
                    digito: digitoLimpo,
                    nome: nomeLimpo,
                    tipo: tipoLimpo,
                    senha: senhaLimpa,
                    saldo: isNaN(saldoNumero) ? 0 : saldoNumero
                });
            }
        });
        
        atualizarInterface();
        document.getElementById('statusConexao').innerHTML = `🟢 Sucesso! ${bancoDados.length} contas carregadas via JSON.`;
    } catch (erro) {
        console.error(erro);
        document.getElementById('statusConexao').innerHTML = "<span style='color: #c0392b;'>❌ Erro. Certifique-se de que o botão 'Compartilhar' da Planilha está para 'Qualquer pessoa com o link'.</span>";
    }
}

function atualizarInterface() {
    const tabela = document.getElementById('tabelaSaldos');
    tabela.innerHTML = '';
    if(bancoDados.length === 0) {
        tabela.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">Nenhum dado encontrado. Verifique se a planilha tem dados a partir da linha 2.</td></tr>`;
        return;
    }
    bancoDados.forEach(p => {
        tabela.innerHTML += `<tr>
            <td><code>${p.conta}-${p.digito}</code></td>
            <td>${p.nome}</td>
            <td><small>${p.tipo}</small></td>
            <td><code>${p.senha}</code></td>
            <td style="font-weight:bold; color:#27ae60;">${p.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
