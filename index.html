<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Painel Admin Oficial</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .secao { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #27ae60; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .config-url { background: #e8f4fd; padding: 15px; border-radius: 6px; border: 1px solid #bce0fd; margin-bottom: 20px; }
        .status-msg { font-weight: bold; margin-top: 5px; font-size: 14px; color: #27ae60; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 BANCO ZINHO - Administrador</h1>
    
    <div class="config-url">
        <label style="font-weight: bold; color: #2980b9;">🔗 Link da Nova Planilha Ativa:</label>
        <input type="text" id="urlPlanilhaGoogle" value="https://docs.google.com/spreadsheets/d/1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4/edit?gid=0#gid=0" readonly style="background:#f1f5f9; color:#64748b;">
        <div id="statusConexao" class="status-msg">🟢 Nova planilha integrada com sucesso!</div>
    </div>

    <div class="secao">
        <h2>1. Sincronização</h2>
        <button onclick="puxarDadosDaNuvem()" style="background-color: #27ae60; font-size: 16px;">🔄 Ler / Atualizar Dados da Planilha</button>
    </div>

    <div class="secao">
        <h2>2. Lista de Alunos Carregada</h2>
        <table>
            <thead>
                <tr>
                    <th>Conta</th>
                    <th>Nome</th>
                    <th>Senha Padrão</th>
                    <th>Saldo Atual</th>
                </tr>
            </thead>
            <tbody id="tabelaSaldos">
                <tr><td colspan="4" style="text-align:center; color:#999;">Clique no botão verde acima para carregar as informações.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
let bancoDados = [];
// ID Atualizado para a sua nova planilha ativa
const idPlanilha = "1w4kxyesR_b6Z-yXY1O4qIlUdiE0yfwGe6MMZ5o4U2-4"; 

async function puxarDadosDaNuvem() {
    document.getElementById('statusConexao').innerHTML = "🔄 Buscando dados atualizados...";
    
    // Puxa os dados da publicação estável em CSV da aba principal (gid=0)
    const urlCSV = `https://docs.google.com/spreadsheets/d/${idPlanilha}/pub?gid=0&output=csv`;
    
    try {
        const response = await fetch(urlCSV);
        const textoCSV = await response.text();
        
        const linhas = textoCSV.split(/\r?\n/);
        bancoDados = [];
        
        for(let i = 1; i < linhas.length; i++) {
            if(!linhas[i]) continue;
            
            const colunas = linhas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if(colunas[0] && colunas[1]) {
                let contaLimpa = colunas[0].replace(/"/g, '').trim().padStart(4, '0');
                let nomeLimpo = colunas[1].replace(/"/g, '').trim().toUpperCase();
                let saldoTexto = colunas[2] ? colunas[2].replace(/"/g, '').replace('R$', '').trim() : "0";
                
                // Conversor de moedas e decimais brasileiro
                if(saldoTexto.includes(',') && saldoTexto.includes('.')) {
                    saldoTexto = saldoTexto.replace(/\./g, '').replace(',', '.');
                } else {
                    saldoTexto = saldoTexto.replace(',', '.');
                }
                
                let saldoNumero = parseFloat(saldoTexto) || 0;

                bancoDados.push({
                    conta: contaLimpa,
                    nome: nomeLimpo,
                    saldo: saldoNumero
                });
            }
        }
        
        atualizarInterface();
        document.getElementById('statusConexao').innerHTML = `🟢 Sucesso! ${bancoDados.length} contas carregadas da nova planilha.`;
    } catch (erro) {
        console.error(erro);
        document.getElementById('statusConexao').innerHTML = "<span style='color: #c0392b;'>❌ Certifique-se de que foi em: Arquivo > Compartilhar > Publicar na Web (como CSV) nesta nova planilha!</span>";
    }
}

function atualizarInterface() {
    const tabela = document.getElementById('tabelaSaldos');
    tabela.innerHTML = '';
    bancoDados.forEach(p => {
        tabela.innerHTML += `<tr>
            <td><code>${p.conta}</code></td>
            <td>${p.nome}</td>
            <td><code>1234</code></td>
            <td style="font-weight:bold; color:#27ae60;">${p.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
