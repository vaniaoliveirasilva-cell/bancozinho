<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANCO ZINHO - Painel Admin Dinâmico</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        h1, h2 { color: #2c3e50; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .secao { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .input-group { display: flex; align-items: center; margin: 5px 0; }
        .input-group span { background: #eee; padding: 10px; border: 1px solid #ccc; border-right: none; border-radius: 4px 0 0 4px; font-weight: bold; }
        .input-group input { border-radius: 0 4px 4px 0; margin: 0; }
        input, select, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        button { background-color: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #219653; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #2980b9; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .config-url { background: #e8f4fd; padding: 15px; border-radius: 6px; border: 1px solid #bce0fd; margin-bottom: 20px; }
        .status-msg { font-weight: bold; margin-top: 5px; font-size: 14px; color: #e67e22; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏦 BANCO ZINHO - Administrador</h1>
    
    <div class="config-url">
        <label style="font-weight: bold; color: #2980b9;">🔗 Cole o Link de Partilha da sua Planilha Google:</label>
        <input type="text" id="urlPlanilhaGoogle" placeholder="Cole aqui o link (Ex: https://docs.google.com/spreadsheets/d/...)" oninput="processarLinkInstantaneo()">
        <div id="statusConexao" class="status-msg">Aguardando que cole o link de uma planilha válida...</div>
    </div>

    <div class="secao">
        <h2>1. Controlo do Painel</h2>
        <button onclick="puxarDadosDaNuvem()" style="background-color: #3498db; font-size: 16px;">🔄 Ler e Atualizar Dados da Planilha</button>
    </div>

    <div class="secao">
        <h2>2. Adicionar Cliente Manualmente (Apenas no Painel)</h2>
        <input type="text" id="nomeParticipante" placeholder="Nome do Cliente">
        <div class="input-group">
            <span>R$</span>
            <input type="number" id="saldoInicial" placeholder="Saldo inicial" step="0.01">
        </div>
        <button onclick="cadastrarManual()">Adicionar à Lista Abaixo</button>
    </div>

    <div class="secao">
        <h2>3. Base de Dados Carregada</h2>
        <table>
            <thead>
                <tr>
                    <th>Conta</th>
                    <th>Nome</th>
                    <th>Senha Padrão</th>
                    <th>Saldo Atual</th>
                </tr>
            </thead>
            <tbody id="tabelaSaldos">
                <tr><td colspan="4" style="text-align:center; color:#999;">Nenhum dado carregado. Cole o link acima e clique em Ler Dados.</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
let bancoDados = [];
let idPlanilha = "";

// Quando a página abre, ela tenta lembrar se você já tinha colado um link antes
window.onload = function() {
    const linkSalvo = localStorage.getItem('linkPlanilhaUniversal');
    if(linkSalvo) {
        document.getElementById('urlPlanilhaGoogle').value = linkSalvo;
        processarLinkInstantaneo();
    }
}

function processarLinkInstantaneo() {
    const url = document.getElementById('urlPlanilhaGoogle').value.trim();
    if(!url) {
        document.getElementById('statusConexao').innerHTML = "Aguardando link...";
        return;
    }

    // Expressão regular robusta para extrair o ID de qualquer formato de link do Google Sheets
    const match = url.match(/\/d\/([a-zA-Z0-9-_]+)/);
    
    if (match && match[1]) {
        idPlanilha = match[1];
        localStorage.setItem('linkPlanilhaUniversal', url);
        document.getElementById('statusConexao').innerHTML = "<span style='color: #27ae60;'>🟢 Planilha detetada! Clique no botão azul para carregar as informações.</span>";
    } else {
        document.getElementById('statusConexao').innerHTML = "<span style='color: #c0392b;'>❌ Link inválido. Certifique-se de copiar o link completo.</span>";
        idPlanilha = "";
    }
}

async function puxarDadosDaNuvem() {
    if(!idPlanilha) {
        alert("Por favor, cole um link válido da planilha primeiro!");
        return;
    }
    
    document.getElementById('statusConexao').innerHTML = "🔄 Lendo linhas da planilha Google...";
    
    // URL formatada para capturar os dados da primeira página (Gviz API)
    const urlLeitura = `https://docs.google.com/spreadsheets/d/${idPlanilha}/gviz/tq?tqx=out:json`;
    
    try {
        const response = await fetch(urlLeitura);
        const texto = await response.text();
        
        // Limpa a resposta de segurança do Google para transformá-la em JSON puro
        const jsonPuro = JSON.parse(texto.substr(47).slice(0, -2));
        const linhas = jsonPuro.table.rows;
        
        bancoDados = [];
        
        linhas.forEach((linha, index) => {
            // Pula a primeira linha (cabeçalho) se ela contiver os títulos
            if(index === 0 && linha.c[0] && isNaN(linha.c[0].v)) return; 
            
            // Verifica se a linha tem dados válidos (Conta e Nome)
            if(linha.c && linha.c[0] !== null && linha.c[1] !== null) {
                bancoDados.push({
                    conta: linha.c[0] ? linha.c[0].v.toString().padStart(4, '0') : index.toString().padStart(4, '0'),
                    nome: linha.c[1] ? linha.c[1].v.toString().toUpperCase() : "SEM NOME",
                    saldo: linha.c[2] ? parseFloat(linha.c[2].v) : 0
                });
            }
        });
        
        atualizarInterface();
        document.getElementById('statusConexao').innerHTML = `<span style='color: #27ae60;'>🟢 Sucesso! ${bancoDados.length} contas carregadas em tempo real.</span>`;
    } catch (erro) {
        console.error(erro);
        document.getElementById('statusConexao').innerHTML = "<span style='color: #c0392b;'>❌ Erro ao ler dados. Verifique se a planilha está configurada para 'Qualquer pessoa com o link' como 'Editor'.</span>";
    }
}

function cadastrarManual() {
    const nome = document.getElementById('nomeParticipante').value.trim().toUpperCase();
    const saldo = parseFloat(document.getElementById('saldoInicial').value) || 0;
    if (!nome) { alert("Introduza o nome do participante."); return; }
    
    const proximaConta = (bancoDados.length + 1).toString().padStart(4, '0');
    bancoDados.push({ conta: proximaConta, nome: nome, saldo: saldo });
    
    atualizarInterface();
    document.getElementById('nomeParticipante').value = '';
    document.getElementById('saldoInicial').value = '';
}

function atualizarInterface() {
    const tabela = document.getElementById('tabelaSaldos');
    tabela.innerHTML = '';
    
    if(bancoDados.length === 0) {
        tabela.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#999;">Nenhum dado encontrado na planilha.</td></tr>`;
        return;
    }

    bancoDados.forEach(p => {
        tabela.innerHTML += `<tr>
            <td><code>${p.conta}</code></td>
            <td>${p.nome}</td>
            <td><code>1234</code></td>
            <td style="font-weight:bold; color:#27ae60;">${p.saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</td>
        </tr>`;
    });
}
</script>
</body>
</html>
